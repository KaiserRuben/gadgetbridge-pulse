x-runner-base: &runner-base
  build:
    context: ..
    dockerfile: runner/Dockerfile
  image: gadgetbridge-runner:v2
  restart: unless-stopped
  environment: &runner-env
    PULSE_ROOT: /data
    PULSE_DB_PATH: /data/pulse.db
    GADGETBRIDGE_DB_PATH: /data/Gadgetbridge.db
    INSIGHTS_ROOT: /data/insights
    STATE_ROOT: /data/state
    ALARMS_ROOT: /data/insights/alarms
    OLLAMA_URL: http://host.docker.internal:11434
    COACH_MODEL: qwen3.6:latest
    TZ: Europe/Berlin
    # Pi ingest (v4 data layer). Empty → runner stays in legacy file-write
    # mode. Set both to enable progressive HTTP push to the Pi dashboard.
    PULSE_INGEST_BASE_URL: ${PULSE_INGEST_BASE_URL:-}
    PULSE_INGEST_TOKEN: ${PULSE_INGEST_TOKEN:-}
    # v4 daemon Pi target — slot/tier1/meta diffs POST here. Defaults to the
    # legacy PULSE_INGEST_BASE_URL so one env var keeps working.
    PULSE_PI_BASE_URL: ${PULSE_PI_BASE_URL:-${PULSE_INGEST_BASE_URL:-}}
    # Outbox is mac-runner-local state — lives in a docker-named volume,
    # NOT in $PULSE_ROOT (Syncthing folder) where bidirectional sync would
    # corrupt the SQLite WAL.
    PULSE_INGEST_OUTBOX_PATH: /runner-state/ingest-outbox.db
    USDA_FDC_API_KEY: ${USDA_FDC_API_KEY:-}
  volumes:
    - "${PULSE_ROOT:-./pulse}:/data"
    - runner-state:/runner-state
    - ./src:/app/src:ro
  extra_hosts:
    - "host.docker.internal:host-gateway"
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # Event-driven runner. Replaces the previous daily-watch + finalize-loop pair.
  # Behaviour:
  #   - chokidar on Gadgetbridge.db → debounced live pipeline (stage 0/1 + alarms,
  #     no LLM) + emit sleep_complete / workout_complete events
  #   - day_end events fire as soon as a wake-date rolls over (driven by the
  #     hourly fallback tick or boot catch-up over FINALIZE_LOOKBACK_DAYS)
  #   - subscribers (events/subscribers.ts) run the full v2 pipeline once per
  #     day_end, serialised per periodKey so the GPU stays single-tenant
  runner:
    <<: *runner-base
    container_name: gadgetbridge-runner
    environment:
      <<: *runner-env
      FINALIZE_LOOKBACK_DAYS: "7"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G
    command: ["node_modules/.bin/tsx", "src/index.ts", "events-loop"]

  # v4 slot-based daemon. Runs in parallel with the legacy runner above
  # until the home page is swapped to view-state (Phase 4). Owns its own
  # cursor file (state/v4-event-cursor.json) and outbox queue
  # (/runner-state/outbox-v4/). POSTs Tier1/Slot/Meta diffs to the Pi
  # ingest endpoint at PULSE_PI_BASE_URL.
  runner-v4:
    <<: *runner-base
    container_name: gadgetbridge-runner-v4
    environment:
      <<: *runner-env
      # outbox-v4 queue dir = $PULSE_STATE_ROOT/outbox-v4. Pin to the
      # docker-named volume so a Syncthing replay never sees these files.
      PULSE_STATE_ROOT: /runner-state
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    command: ["node_modules/.bin/tsx", "src/index.ts", "v4-daemon", "--tick=60"]

volumes:
  runner-state:
    name: gadgetbridge-runner-state
